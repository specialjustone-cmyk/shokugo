<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="食の五十音">
<meta name="theme-color" content="#C13030">
<title>食の五十音</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Kaisei+Opti:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#1A0A00;--paper:#FDF6EC;--warm:#F2E4CE;--red:#C13030;--red2:#E84040;--gold:#D4922A;--gold2:#F0B84A;--green:#2E7D52;--green2:#4CAF78;--blue:#2255AA;--mid:#7A5C3A;--light:#B8926A;--streak:#FF6B00}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden}body{background:var(--paper);color:var(--ink);font-family:'M PLUS Rounded 1c',sans-serif;max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100%;position:relative}
.hdr{background:var(--red);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10}.hdr-logo{font-family:'Kaisei Opti',serif;color:#fff;font-size:17px;letter-spacing:2px;line-height:1.1}.hdr-logo small{font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;opacity:.8;display:block;letter-spacing:1px}.hdr-right{display:flex;align-items:center;gap:10px}.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;color:#fff;font-size:13px;font-weight:700}.streak-fire{font-size:16px}.xp-badge{background:var(--gold2);color:var(--ink);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800;cursor:pointer}
.tabs{display:flex;background:var(--warm);border-bottom:2px solid #E0CEB4;flex-shrink:0}.tab{flex:1;padding:10px 4px 8px;border:none;background:transparent;font-family:'M PLUS Rounded 1c',sans-serif;font-size:11px;color:var(--mid);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}.tab-icon{font-size:18px}.tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:700}
.scroll{flex:1;overflow-y:auto;padding:14px 14px 20px;-webkit-overflow-scrolling:touch}
.dot-strip{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;padding:0 4px}.dot{width:7px;height:7px;border-radius:50%;background:var(--warm);cursor:pointer;transition:all .2s;border:1px solid #D4B896}.dot.cur{background:var(--red);transform:scale(1.4);border-color:var(--red)}.dot.done{background:var(--gold2);border-color:var(--gold)}.dot.mastered{background:var(--green2);border-color:var(--green)}
.card{background:#fff;border-radius:24px;box-shadow:0 4px 24px rgba(26,10,0,.1);padding:24px 20px 20px;text-align:center;animation:fadeUp .35s ease}@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.card-row{font-size:10px;color:var(--light);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}.food-wrap{width:110px;height:110px;border-radius:50%;background:var(--warm);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:72px;box-shadow:0 4px 16px rgba(212,146,42,.25);animation:pop .45s cubic-bezier(.34,1.56,.64,1)}@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}.kana-display{font-family:'Kaisei Opti',serif;font-size:80px;color:var(--red);line-height:1;margin-bottom:4px}.rom-display{font-size:22px;color:var(--mid);font-weight:700;margin-bottom:10px;letter-spacing:1px}.food-label{font-family:'Noto Serif JP',serif;font-size:17px;margin-bottom:3px}.food-label .hl{color:var(--red);font-weight:700}.food-zh{font-size:12px;color:var(--light);margin-bottom:14px}
.hint-card{background:linear-gradient(135deg,#FFF8F0,#FDF3E4);border-radius:14px;padding:12px 14px;text-align:left;margin-bottom:16px;border-left:4px solid var(--gold2);font-size:13px;line-height:1.7;color:var(--ink)}.hint-card b{color:var(--red)}.hint-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-right:4px;margin-bottom:4px;letter-spacing:.5px}.tag-sound{background:#FDE8E8;color:var(--red)}.tag-kanji{background:#E8FDF0;color:var(--green)}.tag-memory{background:#FDF5E8;color:var(--gold)}.tag-scene{background:#EDE8FD;color:#6633CC}
.card-btns{display:flex;gap:10px;align-items:center}.btn-sound{width:46px;height:46px;border-radius:50%;background:var(--gold2);border:none;cursor:pointer;font-size:20px;box-shadow:0 3px 10px rgba(212,146,42,.4);transition:all .15s;flex-shrink:0}.btn-sound:active{transform:scale(.88)}.btn-prev,.btn-next{flex:1;padding:13px;border-radius:14px;border:none;font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;font-weight:700}.btn-prev{background:var(--warm);color:var(--mid)}.btn-next{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(193,48,48,.35)}.btn-next:active{transform:scale(.96)}
.quiz-wrap{animation:fadeUp .35s ease}.quiz-top{background:#fff;border-radius:20px;padding:18px 16px 14px;margin-bottom:12px;box-shadow:0 4px 20px rgba(26,10,0,.08)}.quiz-stats{display:flex;gap:8px;justify-content:center;margin-bottom:14px}.stat-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}.stat-score{background:#FDE8E8;color:var(--red)}.stat-streak2{background:#FFF3E0;color:var(--streak)}.stat-pct{background:#E8FDF0;color:var(--green)}.score-row{display:flex;gap:4px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}.sq{width:9px;height:9px;border-radius:2px;background:var(--warm)}.sq.hit{background:var(--green2)}.sq.miss{background:var(--red2)}
.quiz-romaji{font-family:'Kaisei Opti',serif;font-size:56px;color:var(--ink);line-height:1;margin-bottom:4px;letter-spacing:2px}.quiz-kana-big{font-family:'Kaisei Opti',serif;font-size:72px;color:var(--red);line-height:1;margin-bottom:4px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}.quiz-q{font-size:13px;color:var(--mid);margin-top:8px}.quiz-q b{color:var(--red)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}.opt{padding:16px 8px;border-radius:16px;border:2px solid var(--warm);background:var(--paper);cursor:pointer;transition:all .18s;text-align:center;font-family:'Kaisei Opti',serif}.opt:hover{border-color:var(--gold2);background:#FFF8EE}.opt .ok{font-size:38px;color:var(--ink);display:block;line-height:1.1}.opt.correct{border-color:var(--green);background:#E8F7EE;animation:bop .3s cubic-bezier(.34,1.56,.64,1)}.opt.wrong{border-color:var(--red2);background:#FDE8E8;animation:wag .35s ease}@keyframes bop{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}@keyframes wag{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.result-bar{border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;display:none;text-align:center}.result-bar.show{display:block;animation:fadeUp .25s ease}.result-bar.ok{background:#E8F7EE;color:var(--green)}.result-bar.no{background:#FDE8E8;color:var(--red)}
.quiz-end{background:#fff;border-radius:20px;padding:28px 20px;text-align:center;box-shadow:0 4px 24px rgba(26,10,0,.1);animation:fadeUp .4s ease}.end-emoji{font-size:64px;margin-bottom:12px}.end-score{font-size:40px;font-weight:800;color:var(--red);margin-bottom:4px}.end-label{font-size:14px;color:var(--mid);margin-bottom:18px}.end-stats{display:flex;gap:10px;justify-content:center;margin-bottom:20px}.end-stat{background:var(--warm);border-radius:12px;padding:10px 16px;text-align:center}.end-stat-n{font-size:22px;font-weight:800;color:var(--ink)}.end-stat-l{font-size:10px;color:var(--mid)}.btn-replay{background:var(--red);color:#fff;border:none;padding:14px 32px;border-radius:16px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(193,48,48,.35)}.btn-replay:active{transform:scale(.96)}
.mode-sel{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}.mode-btn{flex:1;min-width:0;padding:9px 4px;border-radius:12px;border:2px solid var(--warm);background:var(--paper);font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;font-weight:700;color:var(--mid);cursor:pointer;transition:all .2s;text-align:center}.mode-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.chart-wrap{animation:fadeUp .35s ease}.row-block{margin-bottom:18px}.row-hdr{font-size:10px;color:var(--mid);letter-spacing:2px;margin-bottom:8px;padding-left:8px;border-left:3px solid var(--gold2)}.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.kcell{background:#fff;border-radius:11px;padding:8px 4px;text-align:center;border:2px solid transparent;cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(26,10,0,.07);position:relative}.kcell:hover{border-color:var(--gold2);transform:translateY(-2px)}.kcell.done{border-color:#C8EEDA;background:#F0FBF5}.kcell.mastered{border-color:var(--gold);background:#FFFBF0}.kcell .cf{font-size:16px;display:block;margin-bottom:1px}.kcell .ck{font-family:'Kaisei Opti',serif;font-size:18px;color:var(--ink);display:block}.kcell .cr{font-size:8px;color:var(--light)}.kcell .mdot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%}
.home-wrap{animation:fadeUp .35s ease}.home-hero{background:linear-gradient(135deg,var(--red) 0%,#A02020 100%);border-radius:20px;padding:22px 20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}.home-hero::before{content:'食';position:absolute;right:-10px;bottom:-20px;font-family:'Kaisei Opti',serif;font-size:120px;opacity:.1}.home-hero h2{font-family:'Kaisei Opti',serif;font-size:22px;margin-bottom:6px}.home-hero p{font-size:13px;opacity:.85;line-height:1.6}.home-progress{display:flex;align-items:center;gap:10px;margin-top:14px}.home-pbar{flex:1;height:8px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}.home-pfill{height:100%;background:var(--gold2);border-radius:99px;transition:width .6s ease}.home-pct{font-size:12px;font-weight:700;opacity:.9}
.streak-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(26,10,0,.08);margin-bottom:14px;display:flex;align-items:center;gap:14px}.streak-icon{font-size:44px}.streak-info h3{font-size:16px;font-weight:800;color:var(--streak)}.streak-info p{font-size:12px;color:var(--mid)}.streak-days{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}.sday{width:28px;height:28px;border-radius:6px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mid);font-weight:700;flex-direction:column;gap:0}.sday.active{background:var(--streak);color:#fff}.sday.done{background:#FFD0A0;color:var(--streak)}.sday .sday-d{font-size:7px;opacity:.7}
.ci-status{font-size:11px;margin-top:6px;padding:4px 8px;border-radius:8px;display:inline-block}.ci-done{background:#E8F7EE;color:var(--green)}.ci-pending{background:#FFF3E0;color:var(--streak)}
.stickers-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(26,10,0,.08);margin-bottom:14px}.stickers-card h3{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:10px}.sticker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.sticker{width:100%;aspect-ratio:1;border-radius:10px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid transparent;transition:all .2s;flex-direction:column;gap:1px;position:relative;overflow:hidden}.sticker.earned{border-color:var(--gold);box-shadow:0 2px 8px rgba(212,146,42,.3);background:#FFFBF0}.sticker.locked{opacity:.45}.sticker .sk{font-size:10px;font-family:'Kaisei Opti',serif;color:var(--mid);line-height:1}.sticker.earned .sk{color:var(--gold)}.sticker .sp{position:absolute;bottom:1px;left:0;right:0;font-size:7px;color:var(--light);text-align:center;font-weight:700}.sticker .sp-bar{position:absolute;bottom:0;left:0;height:3px;background:var(--gold2);border-radius:0 0 8px 8px;transition:width .3s}
.level-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(26,10,0,.08);margin-bottom:14px;text-align:center;cursor:pointer}.level-emoji{font-size:40px}.level-name{font-size:15px;font-weight:800;color:var(--ink);margin:4px 0 2px}.level-xp{font-size:11px;color:var(--light)}.level-bar{height:6px;background:var(--warm);border-radius:99px;margin-top:6px;overflow:hidden}.level-fill{height:100%;background:var(--gold2);border-radius:99px;transition:width .6s ease}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}.overlay-box{background:var(--paper);border-radius:20px;padding:24px 20px;max-width:380px;width:90%;max-height:80vh;overflow-y:auto;animation:fadeUp .3s ease}.overlay-close{background:var(--warm);border:none;padding:10px 24px;border-radius:12px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:13px;font-weight:700;color:var(--mid);cursor:pointer;margin-top:14px}@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lvl-row{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:12px;margin-bottom:6px}.lvl-row.current{background:var(--gold2);color:var(--ink)}.lvl-row.achieved{background:#fff}.lvl-row.locked{background:var(--warm);opacity:.5}.lvl-emoji{font-size:28px;flex-shrink:0}.lvl-info{flex:1;text-align:left}.lvl-info-name{font-size:13px;font-weight:800}.lvl-info-xp{font-size:10px;color:var(--mid)}.lvl-check{font-size:16px}
.quick-btns{display:flex;gap:10px}.qbtn{flex:1;padding:14px 10px;border-radius:16px;border:none;font-family:'M PLUS Rounded 1c',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}.qbtn-learn{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(193,48,48,.3)}.qbtn-quiz{background:var(--gold2);color:var(--ink);box-shadow:0 4px 14px rgba(212,146,42,.3)}.qbtn:active{transform:scale(.96)}
.spell-label{background:#fff;border:2px solid #E0CEB4;border-radius:16px;padding:14px 16px;margin:0 auto 10px;max-width:280px;font-family:'Noto Serif JP',serif;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.1)}.spell-banner{background:var(--red);color:#fff;font-size:10px;letter-spacing:2px;padding:3px 0;border-radius:6px 6px 0 0;margin:-14px -16px 10px;font-weight:700}.spell-name{font-size:24px;color:var(--ink);margin-bottom:4px;letter-spacing:2px}.spell-zh{font-size:12px;color:var(--mid);margin-bottom:6px}.spell-price{font-size:20px;font-weight:700;color:var(--red);font-family:'M PLUS Rounded 1c',sans-serif}.spell-progress{display:flex;gap:6px;justify-content:center;margin:10px 0 12px;flex-wrap:wrap}.spell-slot{min-width:38px;padding:6px 10px;border-radius:10px;background:var(--warm);border:2px solid #D4B896;font-family:'Kaisei Opti',serif;font-size:16px;color:var(--ink);text-align:center;transition:all .2s}.spell-slot.filled{background:#E8F7EE;border-color:var(--green);color:var(--green);font-weight:700}.spell-slot.wrong-flash{background:#FDE8E8;border-color:var(--red2);animation:wag .35s ease}.spell-slot.empty{color:#ccc}.spell-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}.spell-opt{padding:13px 4px;border-radius:14px;border:2px solid var(--warm);background:var(--paper);cursor:pointer;transition:all .18s;text-align:center;font-family:'Kaisei Opti',serif;font-size:17px;color:var(--ink);font-weight:700}.spell-opt:hover{border-color:var(--gold2);background:#FFF8EE}.spell-opt:active{transform:scale(.93)}.spell-opt.flash-wrong{border-color:var(--red2);background:#FDE8E8;animation:wag .35s ease}.spell-hint{font-size:11px;color:var(--light);text-align:center;margin-bottom:6px}
.confetti-layer{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999}.cp{position:absolute;border-radius:2px;animation:cf 1s ease forwards}@keyframes cf{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.reset-btn{background:none;border:1px solid #ddd;color:var(--light);font-size:10px;padding:4px 10px;border-radius:8px;cursor:pointer;margin-top:10px}
.legend{display:flex;gap:10px;justify-content:center;margin-bottom:12px;font-size:10px;color:var(--mid)}.legend-item{display:flex;align-items:center;gap:3px}.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<header class="hdr"><div class="hdr-logo">食の五十音<small>用食物學平假名</small></div><div class="hdr-right"><div class="streak-badge"><span class="streak-fire">🔥</span><span id="streakNum">0</span></div><div class="xp-badge" id="xpBadge" onclick="showLevels()">🍙 <span id="xpNum">0</span></div></div></header>
<div class="tabs"><button class="tab active" onclick="go('home')"><span class="tab-icon">🏠</span>首頁</button><button class="tab" onclick="go('learn')"><span class="tab-icon">📖</span>學習</button><button class="tab" onclick="go('quiz')"><span class="tab-icon">🎯</span>測驗</button><button class="tab" onclick="go('chart')"><span class="tab-icon">📋</span>總覽</button></div>
<div class="scroll" id="scrollArea"><div id="homeTab" class="home-wrap"></div><div id="learnTab" style="display:none"><div class="dot-strip" id="dotStrip"></div><div class="card" id="learnCard"><div class="card-row" id="cardRow"></div><div class="food-wrap" id="foodWrap"></div><div class="kana-display" id="kanaDisp"></div><div class="rom-display" id="romDisp"></div><div class="food-label" id="foodLabel"></div><div class="food-zh" id="foodZh"></div><div class="hint-card" id="hintCard"></div><div class="card-btns"><button class="btn-sound" onclick="playSound()">🔊</button><button class="btn-prev" onclick="prev()">← 上一個</button><button class="btn-next" onclick="next()">下一個 →</button></div></div></div><div id="quizTab" style="display:none"><div class="quiz-wrap" id="quizWrap"></div></div><div id="chartTab" style="display:none"><div class="chart-wrap" id="chartWrap"></div></div></div>
<div id="overlayContainer"></div>
<div class="confetti-layer" id="confettiLayer"></div><div class="toast" id="toast"></div>
<script>
var ROWS=[{row:"あ行",items:[{kana:"あ",rom:"a",food:"🐟",foodJP:"あじ",foodZH:"竹筴魚",hint:'<span class="hint-tag tag-kanji">漢字</span>「あ」來自漢字「安」，唸「a＝啊」。想成「安心吃<b>あ</b>じ」！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>居酒屋菜單「あじの塩焼き」= 鹽烤竹筴魚！'},{kana:"い",rom:"i",food:"🦑",foodJP:"いか",foodZH:"魷魚",hint:'<span class="hint-tag tag-kanji">漢字</span>「い」來自漢字「以」。唸「i＝ㄧ」，<b>い</b>か＝魷魚。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>烤魷魚攤「<b>い</b>かやき」，聞到香味就知道！'},{kana:"う",rom:"u",food:"🍜",foodJP:"うどん",foodZH:"烏龍麵",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「烏」龍麵的「烏」就是「う」的音！中文「烏」＝日文「う」。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商熱食區「<b>う</b>どん」是最便宜的一餐！'},{kana:"え",rom:"e",food:"🍤",foodJP:"えび",foodZH:"蝦",hint:'<span class="hint-tag tag-kanji">漢字</span>「え」來自漢字「衣」，唸「e＝誒」。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商「えびフライ」（炸蝦）是人氣商品！'},{kana:"お",rom:"o",food:"🍙",foodJP:"おにぎり",foodZH:"飯糰",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>吃到好吃飯糰：「お〜！好吃！」＝驚嘆的「喔」。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>7-11三角飯糰區，「<b>お</b>にぎり」絕對要認得！'}]},{row:"か行",items:[{kana:"か",rom:"ka",food:"🦀",foodJP:"かに",foodZH:"螃蟹",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>蟹鉗「喀！喀！」作響。「か」就是「喀」。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>北海道市場「<b>か</b>に」，認得就找到螃蟹攤！'},{kana:"き",rom:"ki",food:"🌲",foodJP:"きのこ",foodZH:"菇類",hint:'<span class="hint-tag tag-kanji">漢字</span>「き」就是漢字「木」草書！きのこ＝木の子＝菇。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超市蔬菜區「<b>き</b>のこ」整排各種菇！'},{kana:"く",rom:"ku",food:"🌰",foodJP:"くり",foodZH:"栗子",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「く」唸「ku＝酷」。栗子＝くり（ku-ri）。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>秋天超商「<b>く</b>りスイーツ」＝栗子口味！'},{kana:"け",rom:"ke",food:"🍰",foodJP:"けーき",foodZH:"蛋糕",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「け」唸「ke」。蛋糕＝<b>け</b>ーき，來自英文cake。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商甜點櫃「<b>け</b>ーき」，日本超商蛋糕是世界頂級！'},{kana:"こ",rom:"ko",food:"🟫",foodJP:"こんにゃく",foodZH:"蒟蒻",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「こ」唸「ko＝扣」。蒟蒻＝「こんにゃく」，第一個字！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>關東煮「<b>こ</b>んにゃく」黑色塊狀，¥100！'}]},{row:"さ行",items:[{kana:"さ",rom:"sa",food:"🍶",foodJP:"さけ",foodZH:"清酒／鮭魚",hint:'<span class="hint-tag tag-memory">💡 一字兩吃</span>「<b>さ</b>け」既是清酒也是鮭魚！唸「sa＝沙」。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>居酒屋「<b>さ</b>け一本！」＝點清酒！'},{kana:"し",rom:"shi",food:"🧂",foodJP:"しお",foodZH:"鹽",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「し」唸「shi」。鹽味拉麵＝「<b>し</b>おラーメン」！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>拉麵店「<b>し</b>おラーメン」是最清淡的選擇！'},{kana:"す",rom:"su",food:"🍣",foodJP:"すし",foodZH:"壽司",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>壽司＝su-shi＝<b>す</b>し。「壽」的音就是「す」！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>回轉壽司店招牌一定有「<b>す</b>し」！'},{kana:"せ",rom:"se",food:"🍘",foodJP:"せんべい",foodZH:"仙貝",hint:'<span class="hint-tag tag-kanji">漢字</span>「せ」來自「世」，唸「se」。仙貝＝<b>せ</b>んべい！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>藥妝店「<b>せ</b>んべい」整排，伴手禮首選！'},{kana:"そ",rom:"so",food:"🍜",foodJP:"そば",foodZH:"蕎麥麵",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「そ」唸「so＝搜」。蕎麥麵＝<b>そ</b>ば，兩個音！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>車站旁立食「<b>そ</b>ば」，最快速午餐！'}]},{row:"た行",items:[{kana:"た",rom:"ta",food:"🥚",foodJP:"たまご",foodZH:"雞蛋",hint:'<span class="hint-tag tag-kanji">漢字</span>「た」來自「太」，唸「ta＝塔」。たまご＝玉子＝蛋！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商「<b>た</b>まごサンド」蛋沙拉三明治是招牌！'},{kana:"ち",rom:"chi",food:"🍢",foodJP:"ちくわ",foodZH:"竹輪",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ち」唸「chi＝七」。竹輪＝<b>ち</b>くわ。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>關東煮「<b>ち</b>くわ」黃色管狀，最便宜！'},{kana:"つ",rom:"tsu",food:"🍡",foodJP:"つくね",foodZH:"雞肉丸",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「つ」唸「tsu」。雞肉丸＝<b>つ</b>くね！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>烤雞串店「<b>つ</b>くね」有醬汁和鹽兩種！'},{kana:"て",rom:"te",food:"🍤",foodJP:"てんぷら",foodZH:"天婦羅",hint:'<span class="hint-tag tag-kanji">漢字</span>「て」來自「天」！天婦羅＝<b>て</b>んぷら！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>蕎麥麵店「<b>て</b>んぷらそば」最受歡迎！'},{kana:"と",rom:"to",food:"🧈",foodJP:"とうふ",foodZH:"豆腐",hint:'<span class="hint-tag tag-kanji">漢字</span>「と」來自「止」，唸「to」。豆腐＝<b>と</b>うふ！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商「<b>と</b>うふ」，日本豆腐超滑嫩！'}]},{row:"な行",items:[{kana:"な",rom:"na",food:"🫘",foodJP:"なっとう",foodZH:"納豆",hint:'<span class="hint-tag tag-kanji">漢字</span>「な」來自「奈」，唸「na」。納豆＝<b>な</b>っとう。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商「<b>な</b>っとう卷き」挑戰日式早餐！'},{kana:"に",rom:"ni",food:"🥕",foodJP:"にんじん",foodZH:"紅蘿蔔",hint:'<span class="hint-tag tag-kanji">漢字</span>「に」來自「仁」。紅蘿蔔＝にんじん＝「人參」日文讀音！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超市「<b>に</b>んじん」，日本紅蘿蔔又甜又嫩！'},{kana:"ぬ",rom:"nu",food:"🥒",foodJP:"ぬか漬け",foodZH:"糠漬物",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ぬ」唸「nu＝怒」。糠＝ぬか，用來醃漬蔬菜。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>定食附餐「<b>ぬ</b>か漬け」是醃黃瓜！'},{kana:"ね",rom:"ne",food:"🌿",foodJP:"ねぎ",foodZH:"蔥",hint:'<span class="hint-tag tag-kanji">漢字</span>「ね」來自「祢」，唸「ne＝內」。蔥＝ねぎ！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>拉麵「<b>ね</b>ぎ増し」就是加蔥！'},{kana:"の",rom:"no",food:"🌿",foodJP:"のり",foodZH:"海苔",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「の」你一定見過！唸「no」。海苔＝<b>の</b>り。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>飯糰包裝「<b>の</b>り」海苔口味，黑色包裝！'}]},{row:"は行",items:[{kana:"は",rom:"ha",food:"🍯",foodJP:"はちみつ",foodZH:"蜂蜜",hint:'<span class="hint-tag tag-kanji">漢字</span>「は」來自「波」，唸「ha＝哈」。蜂蜜＝<b>は</b>ちみつ！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>藥妝店「<b>は</b>ちみつレモン」蜂蜜檸檬必買！'},{kana:"ひ",rom:"hi",food:"🥢",foodJP:"ひじき",foodZH:"羊栖菜",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ひ」唸「hi＝嘻」。羊栖菜＝ひじき，便當黑色小菜。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>便當「<b>ひ</b>じきの煮物」日式便當必有！'},{kana:"ふ",rom:"fu",food:"🧂",foodJP:"ふりかけ",foodZH:"飯鬆",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ふ」唸「fu」，輕輕吹氣。ふりかけ＝撒在飯上的調味料！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商「<b>ふ</b>りかけ」配白飯超好吃的伴手禮！'},{kana:"へ",rom:"he",food:"🥬",foodJP:"へちま",foodZH:"絲瓜",hint:'<span class="hint-tag tag-kanji">漢字</span>「へ」來自「部」，唸「he＝嘿」。字形極簡最好認！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>沖繩「<b>へ</b>ちまの炒め物」菜單上一定有！'},{kana:"ほ",rom:"ho",food:"🥬",foodJP:"ほうれんそう",foodZH:"菠菜",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ほ」唸「ho」。菠菜＝ほうれんそう。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>涼拌「<b>ほ</b>うれんそうのおひたし」就是菠菜！'}]},{row:"ま行",items:[{kana:"ま",rom:"ma",food:"🐟",foodJP:"まぐろ",foodZH:"鮪魚",hint:'<span class="hint-tag tag-kanji">漢字</span>「ま」來自「末」，唸「ma＝媽」。鮪魚＝まぐろ。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>豐洲市場「<b>ま</b>ぐろ丼」鮪魚蓋飯必吃！'},{kana:"み",rom:"mi",food:"🍲",foodJP:"みそ",foodZH:"味噌",hint:'<span class="hint-tag tag-kanji">漢字</span>「み」來自「美」，唸「mi」。味噌＝みそ。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>定食「<b>み</b>そ汁付き」就是附味噌湯！'},{kana:"む",rom:"mu",food:"🌾",foodJP:"むぎ",foodZH:"麥子",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「む」唸「mu＝嘸」。麥茶＝むぎ茶！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商「<b>む</b>ぎ茶」日本夏天國民飲料！'},{kana:"め",rom:"me",food:"🐡",foodJP:"めんたいこ",foodZH:"明太子",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「め」唸「me＝妹」。明太子＝<b>め</b>んたいこ，博多名物！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商飯糰「<b>め</b>んたいこ」辣紅色包裝超人氣！'},{kana:"も",rom:"mo",food:"🌱",foodJP:"もやし",foodZH:"豆芽",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「も」唸「mo＝摸」。豆芽＝もやし，拉麵加もやし免費！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>拉麵「<b>も</b>やし増し」加豆芽免費或¥50！'}]},{row:"や行",items:[{kana:"や",rom:"ya",food:"🍢",foodJP:"やきとり",foodZH:"烤雞串",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「や」唸「ya＝呀」。やきとり＝焼き鳥＝烤雞串。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>居酒屋「<b>や</b>きとり5本セット」邊喝邊吃！'},{kana:"ゆ",rom:"yu",food:"🍋",foodJP:"ゆず",foodZH:"柚子",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ゆ」唸「yu＝又」。柚子＝ゆず，中文「柚」同源！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>冬至泡「<b>ゆ</b>ず湯」是日本傳統！'},{kana:"よ",rom:"yo",food:"🥟",foodJP:"ぎょうざ",foodZH:"餃子",hint:'<span class="hint-tag tag-kanji">漢字</span>「よ」來自「與」，唸「yo」。餃子＝ぎょうざ含有よ音！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>宇都宮「ぎょうざの街」整排餃子店！'}]},{row:"ら行",items:[{kana:"ら",rom:"ra",food:"🍜",foodJP:"らーめん",foodZH:"拉麵",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ら」唸「ra＝拉」。拉麵＝<b>ら</b>ーめん！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>拉麵店招牌「<b>ら</b>ーめん」看到就知道！'},{kana:"り",rom:"ri",food:"🍎",foodJP:"りんご",foodZH:"蘋果",hint:'<span class="hint-tag tag-kanji">漢字</span>「り」來自「利」，唸「ri＝哩」。蘋果＝りんご。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>青森「<b>り</b>んごジュース」種類超多！'},{kana:"る",rom:"ru",food:"🐟",foodJP:"るいべ",foodZH:"冰凍鮭魚",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「る」唸「ru＝嚕」。<b>る</b>いべ是北海道冷凍鮭魚片！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>北海道居酒屋「<b>る</b>いべ」當地限定！'},{kana:"れ",rom:"re",food:"🪷",foodJP:"れんこん",foodZH:"蓮藕",hint:'<span class="hint-tag tag-kanji">漢字</span>「れ」來自「禮」，唸「re」。蓮藕＝れんこん。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>便當「<b>れ</b>んこんのきんぴら」常見小菜！'},{kana:"ろ",rom:"ro",food:"🔥",foodJP:"ろばたやき",foodZH:"爐端燒",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ろ」唸「ro＝囉」。爐端燒＝<b>ろ</b>ばたやき！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>居酒屋「<b>ろ</b>ばた」招牌＝炭火直烤海鮮！'}]},{row:"わ行",items:[{kana:"わ",rom:"wa",food:"🌿",foodJP:"わさび",foodZH:"山葵",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>吃到山葵：「<b>わ</b>！」嗆到鼻子的驚呼！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商管裝「<b>わ</b>さび」配壽司超正宗！'},{kana:"を",rom:"wo",food:"🍙",foodJP:"おにぎりをたべる",foodZH:"吃飯糰",hint:'<span class="hint-tag tag-memory">💡 文法功能</span>「を」是助詞，發音同「お」。おにぎり<b>を</b>たべる＝吃飯糰。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>「これをください」（請給我這個）超實用！'},{kana:"ん",rom:"n",food:"🍊",foodJP:"みかん",foodZH:"橘子",hint:'<span class="hint-tag tag-memory">💡 特殊角色</span>「ん」唯一不帶母音的假名，唸「嗯」。みか<b>ん</b>、うど<b>ん</b>。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商「みかんジュース」冬天限定！'}]}];
var DATA=ROWS.flatMap(function(r){return r.items.map(function(i){var o={};for(var k in i)o[k]=i[k];o.row=r.row;return o})});
var MT=5,SK='shokugo_v4',MQ=10;
var CONF=[['さ','ち'],['は','ほ'],['わ','れ','ね'],['き','さ'],['う','ら'],['め','ぬ'],['る','ろ'],['け','は'],['た','な'],['ま','も']];
var LVLS=[{xp:0,emoji:'🍙',name:'超商新手'},{xp:500,emoji:'🍜',name:'拉麵見習生'},{xp:1500,emoji:'🍣',name:'壽司學徒'},{xp:3500,emoji:'🍱',name:'便當達人'},{xp:7000,emoji:'🏮',name:'居酒屋常客'},{xp:12000,emoji:'👨‍🍳',name:'料理職人'},{xp:20000,emoji:'🐟',name:'築地之王'}];
function getLvl(xp){var l=LVLS[0];for(var i=1;i<LVLS.length;i++){if(xp>=LVLS[i].xp)l=LVLS[i];else break}return l}
function getNextLvl(xp){for(var i=1;i<LVLS.length;i++){if(xp<LVLS[i].xp)return LVLS[i]}return null}
function getLvlIdx(xp){var idx=0;for(var i=1;i<LVLS.length;i++){if(xp>=LVLS[i].xp)idx=i;else break}return idx}

function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/864e5)}

function defSave(){var ks={};DATA.forEach(function(d){ks[d.kana]={c:0,w:0}});return{xp:0,str:{n:0,d:null},ci:false,ciD:null,nk:0,nkD:null,vis:[],ciLog:[],ks:ks}}
function load(){try{var r=localStorage.getItem(SK);if(!r)return defSave();var s=JSON.parse(r);DATA.forEach(function(d){if(!s.ks[d.kana])s.ks[d.kana]={c:0,w:0}});if(!s.ciLog)s.ciLog=[];var t=td();if(s.str.d&&daysBetween(s.str.d,t)>1)s.str.n=0;if(s.ciD!==t)s.ci=false;if(s.nkD!==t){s.nk=0;s.nkD=t}return s}catch(e){return defSave()}}
function sv(){localStorage.setItem(SK,JSON.stringify(S))}
var S=load();var prevLvl=getLvl(S.xp).name;

// iOS audio unlock
var audioUnlocked=false;
function unlockAudio(){if(audioUnlocked)return;try{var c=gax();if(c&&c.state==='suspended')c.resume();audioUnlocked=true}catch(e){}}
document.addEventListener('touchstart',unlockAudio,{once:true});

function doCheckin(){if(S.ci)return;var t=td();if(S.str.d===t)return;var diff=S.str.d?daysBetween(S.str.d,t):99;if(diff===1)S.str.n++;else S.str.n=1;S.str.d=t;S.ci=true;S.ciD=t;if(S.ciLog.indexOf(t)===-1)S.ciLog.push(t);if(S.ciLog.length>60)S.ciLog=S.ciLog.slice(-60);sv();toast('🔥 打卡成功！連續 '+S.str.n+' 天')}

function renderQuiz(){if(qIdx>=MQ){showEnd();return}var cd,opts;if(qMode==='D'){var grp=CONF[Math.floor(Math.random()*CONF.length)];var ck=grp[Math.floor(Math.random()*grp.length)];cd=DATA.find(function(d){return d.kana===ck});var gd=grp.map(function(k){return DATA.find(function(d){return d.kana===k})}).filter(Boolean);while(gd.length<4){var r=DATA[Math.floor(Math.random()*DATA.length)];if(!gd.find(function(g){return g.kana===r.kana}))gd.push(r)}opts=gd.sort(function(){return Math.random()-.5})}else{cd=pickQ();var wrongs=[];while(wrongs.length<3){var r=DATA[Math.floor(Math.random()*DATA.length)];if(r.kana!==cd.kana&&!wrongs.find(function(w){return w.kana===r.kana}))wrongs.push(r)}opts=[cd].concat(wrongs).sort(function(){return Math.random()-.5})}var sr=document.getElementById('scoreRow');sr.innerHTML='';for(var i=0;i<MQ;i++){var s=document.createElement('div');s.className='sq'+(i<qScores.length?(qScores[i]?' hit':' miss'):'');sr.appendChild(s)}var tot=qScores.length,hits=qScores.filter(Boolean).length;document.getElementById('qScore').textContent=hits*5;document.getElementById('qStreak').textContent=qSC;document.getElementById('qPct').textContent=tot?Math.round(hits/tot*100)+'%':'-';var qc=document.getElementById('quizContent'),qq=document.getElementById('quizQ');qc.innerHTML='';if(qMode==='A'||qMode==='D'){qc.innerHTML='<div class="quiz-romaji">'+cd.rom+'</div>';qq.innerHTML='下面哪個假名的發音是 <b>'+cd.rom+'</b>？'+(qMode==='D'?'<br><span style="font-size:11px;color:var(--streak)">⚡ 注意！選項都是長很像的假名</span>':'');var oe=document.getElementById('opts');oe.innerHTML='';opts.forEach(function(o){var b=document.createElement('button');b.className='opt';b.innerHTML='<span class="ok">'+o.kana+'</span>';b.onclick=function(){answer(b,o.kana===cd.kana,cd)};oe.appendChild(b)})}else if(qMode==='B'){qc.innerHTML='<div class="quiz-kana-big">'+cd.kana+'</div>';qq.innerHTML='這個假名 <b>'+cd.kana+'</b> 的發音是？';var oe=document.getElementById('opts');oe.innerHTML='';opts.forEach(function(o){var b=docu var AudioC=window.AudioContext||window.webkitAudioContext;var ax=null;function gax(){try{if(!ax)ax=new AudioC();if(ax.state==='suspended')ax.resume();return ax}catch(e){return null}}
function beepOk(){var c=gax();if(!c)return;try{var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(523,c.currentTime);o.frequency.setValueAtTime(659,c.currentTime+.1);o.frequency.setValueAtTime(784,c.currentTime+.2);g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.start();o.stop(c.currentTime+.5)}catch(e){}}

function beepTap(){var c=gax();if(!c)return;try{var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(660,c.currentTime);g.gain.setValueAtTime(.12,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.08);o.start();o.stop(c.currentTime+.08)}catch(e){}}

function getRomaji(ks){var map={};DATA.forEach(function(d){if(d.kana)map[d.kana]=d.rom});var ext={'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go','ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo','だ':'da','ぢ':'di','づ':'du','で':'de','ど':'do','ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po'};for(var k in ext){if(!map[k])map[k]=ext[k]}var cb={'ゃ':'ya','ゅ':'yu','ょ':'yo'};var res=[];var i=0;while(i<ks.length){var ch=ks[i];if(ch==='っ'){var nc=ks[i+1];if(nc&&map[nc]){var nr=map[nc];var an=ks[i+2];if(an&&cb[an]){var b=nr.slice(0,-1);var f=b+cb[an];res.push(f[0]+f);i+=3}else{res.push(nr[0]+nr);i+=2}}else i++;continue}if(ch==='ー'){if(res.length>0)res.push(res[res.length-1].slice(-1));i++;continue}if(ch===' '||ch==='　'){i++;continue}var nc2=ks[i+1];if(map[ch]&&nc2&&cb[nc2]){res.push(map[ch].slice(0,-1)+cb[nc2]);i+=2;continue}if(map[ch]){res.push(map[ch]);i++;continue}i++}return res}

,rom)};so.appendChild(b)})}
function spellTap(btn,rom){var exp=spT[spP.length];if(!exp)return;if(rom===exp){spP.push(rom);beepTap();var slot=document.getElementById('slot'+(spP.length-1));slot.textContent=rom;slot.className='spell-slot filled';if(spP.length===spT.length){spA===0?qScores.push(true):qScores.push(false);recQuiz(spD.kana,spA===0);var won=spA===0;if(won){qSC++;addXP(10+qSC*2);confetti();beepOk();if(qSC>=3)toast('🔥 連答'+qSC+'個！')}else{qSC=0;beepTap()}var rb=document.getElementById('resultBar');rb.className='result-bar show '+(won?'ok':'no');rb.textContent=won?'✅ 完美！'+spD.foodJP+' = '+spT.join('-')+' '+spD.food:'✅ 拼出來了！但中途答錯過 '+spD.food;setTimeout(function(){qIdx++;renderQuiz()},won?2000:7000)}}else{spA++;qSC=0;beepNo();btn.classList.add('flash-wrong');setTimeout(function(){btn.classList.remove('flash-wrong')},600);spT.forEach(function(_,i){var s=document.getElementById('slot'+i);if(s){s.className='spell-slot wrong-flash';setTimeout(function(){s.className='spell-slot empty';s.textContent='＿'},700)}});spP=[];var rb=document.getElementById('resultBar');rb.className='result-bar show no';rb.textContent='❌ 答錯了！從頭重拼 — 提示：'+spT[0]+'開頭';setTimeout(function(){rb.className='result-bar'},7000)}}
function showEnd(){doCheckin();var hits=qScores.filter(Boolean).length,pct=Math.round(hits/MQ*100),bonus=hits>=9?20:hits>=7?10:hits>=5?5:0;if(bonus)addXP(bonus);var m=mc();document.getElementById('quizWrap').innerHTML='<div class="quiz-end"><div class="end-emoji">'+(pct>=90?'🎉':pct>=70?'😊':pct>=50?'🙂':'😅')+'</div><div class="end-score">'+hits+'/'+MQ+'</div><div class="end-label">'+(pct>=90?'完美！你是假名大師！':pct>=70?'很棒！繼續練習！':pct>=50?'加油！你做得到！':'再練習一次，你可以的！')+'</div><div class="end-stats"><div class="end-stat"><div class="end-stat-n">'+pct+'%</div><div class="end-stat-l">正確率</div></div><div class="end-stat"><div class="end-stat-n">'+(hits*5+bonus)+'XP</div><div class="end-stat-l">獲得經驗</div></div><div class="end-stat"><div class="end-stat-n">'+m+'⭐</div><div class="end-stat-l">已掌握</div></div></div>'+(bonus?'<div style="color:var(--gold);font-size:13px;margin-bottom:12px;font-weight:700">🌟 優秀獎勵 +'+bonus+'XP！</div>':'')+'<button class="btn-replay" onclick="initQuiz()">再挑戰一次 🎯</button></div>';if(pct>=90)for(var i=0;i<6;i++)setTimeout(confetti,i*150)}

// ═══ CHART ═══
function renderChart(){var w=document.getElementById('chartWrap');w.innerHTML='<div class="legend"><span class="legend-item"><span class="legend-dot" style="background:var(--green2)"></span> ≥80%</span><span class="legend-item"><span class="legend-dot" style="background:var(--gold2)"></span> ≥50%</span><span class="legend-item"><span class="legend-dot" style="background:var(--red2)"></span> <50%</span><span class="legend-item"><span class="legend-dot" style="background:var(--warm);border:1px solid #D4B896"></span> 未測驗</span></div>';var vs=new Set(S.vis);ROWS.forEach(function(row){var sec=document.createElement('div');sec.className='row-block';sec.innerHTML='<div class="row-hdr">'+row.row+'</div>';var g=document.createElement('div');g.className='kgrid';row.items.forEach(function(item){var idx=DATA.findIndex(function(d){return d.kana===item.kana});var m=isM(item.kana);var st=S.ks[item.kana];var tot=st.c+st.w;var c=document.createElement('div');c.className='kcell'+(m?' mastered':vs.has(idx)?' done':'');var dot='';if(tot>0){var r=st.c/tot;dot='<span class="mdot" style="background:'+(r>=.8?'var(--green2)':r>=.5?'var(--gold2)':'var(--red2)')+'"></span>'}c.innerHTML=dot+'<span class="cf">'+item.food+'</span><span class="ck">'+item.kana+'</span><span class="cr">'+item.rom+'</span>';c.onclick=function(){cur=idx;go('learn')};g.appendChild(c)});sec.appendChild(g);w.appendChild(sec)})}

// ═══ XP ═══
function addXP(n){S.xp+=n;sv();var newLv=getLvl(S.xp);if(newLv.name!==prevLvl){prevLvl=newLv.name;toast('🎉 升級！'+newLv.emoji+' '+newLv.name+'！');for(var i=0;i<4;i++)setTimeout(confetti,i*200)}hdr()}
function confetti(){var l=document.getElementById('confettiLayer');var cs=['#C13030','#D4922A','#2E7D52','#2255AA','#E84040','#F0B84A'];for(var i=0;i<16;i++){var p=document.createElement('div');p.className='cp';p.style.cssText='left:'+Math.random()*100+'%;top:0;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;background:'+cs[Math.floor(Math.random()*cs.length)]+';animation-delay:'+Math.random()*.4+'s;animation-duration:'+(.9+Math.random()*.6)+'s';l.appendChild(p);setTimeout(function(){p.remove()},1600)}}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
hdr();renderHome();
</script>
