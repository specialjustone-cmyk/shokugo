<style>
:root{--ink:#1A0A00;--paper:#FDF6EC;--warm:#F2E4CE;--red:#C13030;--red2:#E84040;--gold:#D4922A;--gold2:#F0B84A;--green:#2E7D52;--green2:#4CAF78;--blue:#2255AA;--mid:#7A5C3A;--light:#B8926A;--streak:#FF6B00}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden}body{background:var(--paper);color:var(--ink);font-family:'M PLUS Rounded 1c',sans-serif;max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100%;position:relative}.hdr{background:var(--red);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10}.hdr-logo{font-family:'Kaisei Opti',serif;color:#fff;font-size:17px;letter-spacing:2px;line-height:1.1}.hdr-logo small{font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;opacity:.8;display:block;letter-spacing:1px}.hdr-right{display:flex;align-items:center;gap:10px}.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;color:#fff;font-size:13px;font-weight:700}.streak-fire{font-size:16px}.xp-badge{background:var(--gold2);color:var(--ink);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800}.tabs{display:flex;background:var(--warm);border-bottom:2px solid #E0CEB4;flex-shrink:0}.tab{flex:1;padding:10px 4px 8px;border:none;background:transparent;font-family:'M PLUS Rounded 1c',sans-serif;font-size:11px;color:var(--mid);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}.tab-icon{font-size:18px}.tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:700}.scroll{flex:1;overflow-y:auto;padding:14px 14px 20px;-webkit-overflow-scrolling:touch}.dot-strip{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;padding:0 4px}.dot{width:7px;height:7px;border-radius:50%;background:var(--warm);cursor:pointer;transition:all .2s;border:1px solid #D4B896}.dot.cur{background:var(--red);transform:scale(1.4);border-color:var(--red)}.dot.done{background:var(--gold2);border-color:var(--gold)}.dot.mastered{background:var(--green2);border-color:var(--green)}.card{background:#fff;border-radius:24px;box-shadow:0 4px 24px rgba(26,10,0,.1);padding:24px 20px 20px;text-align:center;animation:fadeUp .35s ease}@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.card-row{font-size:10px;color:var(--light);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}.food-wrap{width:110px;height:110px;border-radius:50%;background:var(--warm);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:72px;box-shadow:0 4px 16px rgba(212,146,42,.25);animation:pop .45s cubic-bezier(.34,1.56,.64,1)}@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}.kana-display{font-family:'Kaisei Opti',serif;font-size:80px;color:var(--red);line-height:1;margin-bottom:4px}.rom-display{font-size:22px;color:var(--mid);font-weight:700;margin-bottom:10px;letter-spacing:1px}.food-label{font-family:'Noto Serif JP',serif;font-size:17px;margin-bottom:3px}.food-label .hl{color:var(--red);font-weight:700}.food-zh{font-size:12px;color:var(--light);margin-bottom:14px}.hint-card{background:linear-gradient(135deg,#FFF8F0,#FDF3E4);border-radius:14px;padding:12px 14px;text-align:left;margin-bottom:16px;border-left:4px solid var(--gold2);font-size:13px;line-height:1.7;color:var(--ink)}.hint-card b{color:var(--red)}.hint-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-right:4px;margin-bottom:4px;letter-spacing:.5px}.tag-sound{background:#FDE8E8;color:var(--red)}.tag-kanji{background:#E8FDF0;color:var(--green)}.tag-memory{background:#FDF5E8;color:var(--gold)}.tag-scene{background:#EDE8FD;color:#6633CC}.card-btns{display:flex;gap:10px;align-items:center}.btn-sound{width:46px;height:46px;border-radius:50%;background:var(--gold2);border:none;cursor:pointer;font-size:20px;box-shadow:0 3px 10px rgba(212,146,42,.4);transition:all .15s;flex-shrink:0}.btn-sound:active{transform:scale(.88)}.btn-prev,.btn-next{flex:1;padding:13px;border-radius:14px;border:none;font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;font-weight:700}.btn-prev{background:var(--warm);color:var(--mid)}.btn-next{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(193,48,48,.35)}.btn-next:active{transform:scale(.96)}.quiz-wrap{animation:fadeUp .35s ease}.quiz-top{background:#fff;border-radius:20px;padding:18px 16px 14px;margin-bottom:12px;box-shadow:0 4px 20px rgba(26,10,0,.08)}.quiz-stats{display:flex;gap:8px;justify-content:center;margin-bottom:14px}.stat-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}.stat-score{background:#FDE8E8;color:var(--red)}.stat-streak2{background:#FFF3E0;color:var(--streak)}.stat-pct{background:#E8FDF0;color:var(--green)}.score-row{display:flex;gap:4px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}.sq{width:9px;height:9px;border-radius:2px;background:var(--warm)}.sq.hit{background:var(--green2)}.sq.miss{background:var(--red2)}.quiz-romaji{font-family:'Kaisei Opti',serif;font-size:56px;color:var(--ink);line-height:1;margin-bottom:4px;letter-spacing:2px}.quiz-kana-big{font-family:'Kaisei Opti',serif;font-size:72px;color:var(--red);line-height:1;margin-bottom:4px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}.quiz-q{font-size:13px;color:var(--mid);margin-top:8px}.quiz-q b{color:var(--red)}.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}.opt{padding:16px 8px;border-radius:16px;border:2px solid var(--warm);background:var(--paper);cursor:pointer;transition:all .18s;text-align:center;font-family:'Kaisei Opti',serif}.opt:hover{border-color:var(--gold2);background:#FFF8EE}.opt .ok{font-size:38px;color:var(--ink);display:block;line-height:1.1}.opt.correct{border-color:var(--green);background:#E8F7EE;animation:bop .3s cubic-bezier(.34,1.56,.64,1)}.opt.wrong{border-color:var(--red2);background:#FDE8E8;animation:wag .35s ease}@keyframes bop{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}@keyframes wag{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.result-bar{border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;display:none;text-align:center}.result-bar.show{display:block;animation:fadeUp .25s ease}.result-bar.ok{background:#E8F7EE;color:var(--green)}.result-bar.no{background:#FDE8E8;color:var(--red)}.quiz-end{background:#fff;border-radius:20px;padding:28px 20px;text-align:center;box-shadow:0 4px 24px rgba(26,10,0,.1);animation:fadeUp .4s ease}.end-emoji{font-size:64px;margin-bottom:12px}.end-score{font-size:40px;font-weight:800;color:var(--red);margin-bottom:4px}.end-label{font-size:14px;color:var(--mid);margin-bottom:18px}.end-stats{display:flex;gap:10px;justify-content:center;margin-bottom:20px}.end-stat{background:var(--warm);border-radius:12px;padding:10px 16px;text-align:center}.end-stat-n{font-size:22px;font-weight:800;color:var(--ink)}.end-stat-l{font-size:10px;color:var(--mid)}.btn-replay{background:var(--red);color:#fff;border:none;padding:14px 32px;border-radius:16px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(193,48,48,.35)}.btn-replay:active{transform:scale(.96)}.mode-sel{display:flex;gap:8px;margin-bottom:12px}.mode-btn{flex:1;padding:9px 4px;border-radius:12px;border:2px solid var(--warm);background:var(--paper);font-family:'M PLUS Rounded 1c',sans-serif;font-size:11px;font-weight:700;color:var(--mid);cursor:pointer;transition:all .2s;text-align:center}.mode-btn.active{background:var(--red);color:#fff;border-color:var(--red)}.chart-wrap{animation:fadeUp .35s ease}.row-block{margin-bottom:18px}.row-hdr{font-size:10px;color:var(--mid);letter-spacing:2px;margin-bottom:8px;padding-left:8px;border-left:3px solid var(--gold2)}.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.kcell{background:#fff;border-radius:11px;padding:8px 4px;text-align:center;border:2px solid transparent;cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(26,10,0,.07);position:relative}.kcell:hover{border-color:var(--gold2);transform:translateY(-2px)}.kcell.done{border-color:#C8EEDA;background:#F0FBF5}.kcell.mastered{border-color:var(--gold);background:#FFFBF0}.kcell .cf{font-size:16px;display:block;margin-bottom:1px}.kcell .ck{font-family:'Kaisei Opti',serif;font-size:18px;color:var(--ink);display:block}.kcell .cr{font-size:8px;color:var(--light)}.kcell .mdot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%}.home-wrap{animation:fadeUp .35s ease}.home-hero{background:linear-gradient(135deg,var(--red) 0%,#A02020 100%);border-radius:20px;padding:22px 20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}.home-hero::before{content:'食';position:absolute;right:-10px;bottom:-20px;font-family:'Kaisei Opti',serif;font-size:120px;opacity:.1}.home-hero h2{font-family:'Kaisei Opti',serif;font-size:22px;margin-bottom:6px}.home-hero p{font-size:13px;opacity:.85;line-height:1.6}.home-progress{display:flex;align-items:center;gap:10px;margin-top:14px}.home-pbar{flex:1;height:8px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}.home-pfill{height:100%;background:var(--gold2);border-radius:99px;transition:width .6s ease}.home-pct{font-size:12px;font-weight:700;opacity:.9}.streak-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(26,10,0,.08);margin-bottom:14px;display:flex;align-items:center;gap:14px}.streak-icon{font-size:44px}.streak-info h3{font-size:16px;font-weight:800;color:var(--streak)}.streak-info p{font-size:12px;color:var(--mid)}.streak-days{display:flex;gap:5px;margin-top:8px}.sday{width:32px;height:32px;border-radius:8px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mid);font-weight:700}.sday.active{background:var(--streak);color:#fff}.sday.done{background:#FFD0A0;color:var(--streak)}.ci-status{font-size:11px;margin-top:6px;padding:4px 8px;border-radius:8px;display:inline-block}.ci-done{background:#E8F7EE;color:var(--green)}.ci-pending{background:#FFF3E0;color:var(--streak)}.stickers-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(26,10,0,.08);margin-bottom:14px}.stickers-card h3{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:10px}.sticker-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}.sticker{width:100%;aspect-ratio:1;border-radius:8px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid transparent;transition:all .2s;flex-direction:column;gap:1px}.sticker.earned{border-color:var(--gold);box-shadow:0 2px 8px rgba(212,146,42,.3);background:#FFFBF0}.sticker.locked{filter:grayscale(1);opacity:.3}.sticker .sk{font-size:10px;font-family:'Kaisei Opti',serif;color:var(--mid);line-height:1}.sticker.earned .sk{color:var(--gold)}.quick-btns{display:flex;gap:10px}.qbtn{flex:1;padding:14px 10px;border-radius:16px;border:none;font-family:'M PLUS Rounded 1c',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}.qbtn-learn{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(193,48,48,.3)}.qbtn-quiz{background:var(--gold2);color:var(--ink);box-shadow:0 4px 14px rgba(212,146,42,.3)}.qbtn:active{transform:scale(.96)}.spell-label{background:#fff;border:2px solid #E0CEB4;border-radius:16px;padding:14px 16px;margin:0 auto 10px;max-width:280px;font-family:'Noto Serif JP',serif;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.1)}.spell-banner{background:var(--red);color:#fff;font-size:10px;letter-spacing:2px;padding:3px 0;border-radius:6px 6px 0 0;margin:-14px -16px 10px;font-weight:700}.spell-name{font-size:24px;color:var(--ink);margin-bottom:4px;letter-spacing:2px}.spell-zh{font-size:12px;color:var(--mid);margin-bottom:6px}.spell-price{font-size:20px;font-weight:700;color:var(--red);font-family:'M PLUS Rounded 1c',sans-serif}.spell-progress{display:flex;gap:6px;justify-content:center;margin:10px 0 12px;flex-wrap:wrap}.spell-slot{min-width:38px;padding:6px 10px;border-radius:10px;background:var(--warm);border:2px solid #D4B896;font-family:'Kaisei Opti',serif;font-size:16px;color:var(--ink);text-align:center;transition:all .2s}.spell-slot.filled{background:#E8F7EE;border-color:var(--green);color:var(--green);font-weight:700}.spell-slot.wrong-flash{background:#FDE8E8;border-color:var(--red2);animation:wag .35s ease}.spell-slot.empty{color:#ccc}.spell-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}.spell-opt{padding:13px 4px;border-radius:14px;border:2px solid var(--warm);background:var(--paper);cursor:pointer;transition:all .18s;text-align:center;font-family:'Kaisei Opti',serif;font-size:17px;color:var(--ink);font-weight:700}.spell-opt:hover{border-color:var(--gold2);background:#FFF8EE}.spell-opt:active{transform:scale(.93)}.spell-opt.flash-wrong{border-color:var(--red2);background:#FDE8E8;animation:wag .35s ease}.spell-hint{font-size:11px;color:var(--light);text-align:center;margin-bottom:6px}.confetti-layer{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999}.cp{position:absolute;border-radius:2px;animation:cf 1s ease forwards}@keyframes cf{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.reset-btn{background:none;border:1px solid #ddd;color:var(--light);font-size:10px;padding:4px 10px;border-radius:8px;cursor:pointer;margin-top:10px}
</style>

<body>
<header class="hdr"><div class="hdr-logo">食の五十音<small>用食物學平假名</small></div><div class="hdr-right"><div class="streak-badge"><span class="streak-fire">🔥</span><span id="streakNum">0</span></div><div class="xp-badge">⭐ <span id="xpNum">0</span></div></div></header>

<div class="scroll" id="scrollArea"><div id="homeTab" class="home-wrap"></div><div id="learnTab" style="display:none"><div class="dot-strip" id="dotStrip"></div><div class="card" id="learnCard"><div class="card-row" id="cardRow"></div><div class="food-wrap" id="foodWrap"></div><div class="kana-display" id="kanaDisp"></div><div class="rom-display" id="romDisp"></div><div class="food-label" id="foodLabel"></div><div class="food-zh" id="foodZh"></div><div class="hint-card" id="hintCard"></div><div class="card-btns"><button class="btn-sound" onclick="playSound()">🔊</button><button class="btn-prev" onclick="prev()">← 上一個</button><button class="btn-next" onclick="next()">下一個 →</button></div></div></div><div id="quizTab" style="display:none"><div class="quiz-wrap" id="quizWrap"></div></div><div id="chartTab" style="display:none"><div class="chart-wrap" id="chartWrap"></div></div></div>
<div class="confetti-layer" id="confettiLayer"></div><div class="toast" id="toast"></div>
<script>
const ROWS=[{row:"あ行",items:[{kana:"あ",rom:"a",food:"🐟",foodJP:"あじ",foodZH:"竹筴魚",hint:'<span class="hint-tag tag-kanji">漢字</span>「あ」來自漢字「安」，唸「a＝啊」。想成「安心吃<b>あ</b>じ」！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>居酒屋菜單上「あじの塩焼き」= 鹽烤竹筴魚，旅遊必點！'},{kana:"い",rom:"i",food:"🦑",foodJP:"いか",foodZH:"魷魚",hint:'<span class="hint-tag tag-kanji">漢字</span>「い」來自漢字「以」，左邊的人形。唸「i＝ㄧ」，<b>い</b>か＝魷魚。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>夜市烤魷魚攤上寫著「<b>い</b>かやき」，聞到香味就知道是它！'},{kana:"う",rom:"u",food:"🍜",foodJP:"うどん",foodZH:"烏龍麵",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「烏」龍麵的「烏」就是「う」的音！中文「烏」＝日文「う」，完美對應。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商收銀台旁邊熱食區，「<b>う</b>どん」是最便宜的一餐！'},{kana:"え",rom:"e",food:"🍤",foodJP:"えび",foodZH:"蝦",hint:'<span class="hint-tag tag-kanji">漢字</span>「え」來自漢字「衣」，唸「e＝誒」。台語「蝦」念「hê」，尾音跟え很像！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商熱食架上「えびフライ」（炸蝦）是人氣商品，看到えび就選它！'},{kana:"お",rom:"o",food:"🍙",foodJP:"おにぎり",foodZH:"飯糰",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>吃到好吃飯糰的第一個反應：「お〜！好吃！」。「お」就是驚嘆的「喔」。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>7-11收銀台旁三角飯糰區，「<b>お</b>にぎり」三個字絕對要認得！'}]},{row:"か行",items:[{kana:"か",rom:"ka",food:"🦀",foodJP:"かに",foodZH:"螃蟹",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>螃蟹蟹鉗夾東西「喀！喀！」作響。「か」就是那個「喀」。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>北海道市場招牌大寫「<b>か</b>に」，這個字認得就能找到螃蟹攤！'},{kana:"き",rom:"ki",food:"🌲",foodJP:"きのこ",foodZH:"菇類",hint:'<span class="hint-tag tag-kanji">漢字</span>「き」就是漢字「木」的草書！きのこ＝木の子＝樹的小孩＝菇。一個公式記住！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超市蔬菜區「<b>き</b>のこ」整排各種菇，日本菇類種類超多！'},{kana:"く",rom:"ku",food:"🌰",foodJP:"くり",foodZH:"栗子",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「く」唸「ku＝酷」。「栗」中文念「lì」，日文念「くり（ku-ri）」，韻母相通！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>秋天日本超商必出「<b>く</b>りスイーツ」，看到く就是栗子口味！'},{kana:"け",rom:"ke",food:"🍰",foodJP:"けーき",foodZH:"蛋糕",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「け」唸「ke」。蛋糕＝<b>け</b>ーき，來自英文cake的日文化。日本蛋糕精緻到不行！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商甜點櫃「<b>け</b>ーき」種類超多，日本超商蛋糕是世界頂級水準！'},{kana:"こ",rom:"ko",food:"🟫",foodJP:"こんにゃく",foodZH:"蒟蒻",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「こ」唸「ko＝扣」。蒟蒻＝「こんにゃく」，第一個字就是こ，開口就記住！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商關東煮鍋裡「<b>こ</b>んにゃく」是黑色塊狀，1個才¥100左右！'}]},{row:"さ行",items:[{kana:"さ",rom:"sa",food:"🍶",foodJP:"さけ",foodZH:"清酒／鮭魚",hint:'<span class="hint-tag tag-memory">💡 一字兩吃</span>「<b>さ</b>け」既是清酒也是鮭魚！唸「sa＝沙」。一個音記兩樣！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>居酒屋「<b>さ</b>け一本！」＝點清酒；超商「<b>さ</b>けおにぎり」＝鮭魚飯糰！'},{kana:"し",rom:"shi",food:"🧂",foodJP:"しお",foodZH:"鹽",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「し」唸「shi」。鹽味拉麵叫「<b>し</b>おラーメン」——記住這道菜就記住し！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>拉麵店看菜單「<b>し</b>おラーメン」是鹽味拉麵，是最清淡的選擇！'},{kana:"す",rom:"su",food:"🍣",foodJP:"すし",foodZH:"壽司",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>壽司＝su-shi＝<b>す</b>し。「壽」的音就是「す」！你可能已經會了。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>回轉壽司店招牌一定有「<b>す</b>し」，認得這個字就找到壽司店了！'},{kana:"せ",rom:"se",food:"🍘",foodJP:"せんべい",foodZH:"仙貝",hint:'<span class="hint-tag tag-kanji">漢字</span>「せ」來自漢字「世」，唸「se」。仙貝＝<b>せ</b>んべい，「仙」的日文音就是せん！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>藥妝店零食區「<b>せ</b>んべい」整排，是送禮伴手禮首選！'},{kana:"そ",rom:"so",food:"🍜",foodJP:"そば",foodZH:"蕎麥麵",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「そ」唸「so＝搜」。蕎麥麵＝<b>そ</b>ば，只有兩個音，超好記！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>車站旁立食蕎麥麵店「<b>そ</b>ば」，日本上班族最快速的午餐！'}]},{row:"た行",items:[{kana:"た",rom:"ta",food:"🥚",foodJP:"たまご",foodZH:"雞蛋",hint:'<span class="hint-tag tag-kanji">漢字</span>「た」來自漢字「太」，唸「ta＝塔」。たまご的「たま」來自漢字「玉」＝圓的東西＝蛋！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商熟食「<b>た</b>まごサンド」（蛋沙拉三明治）是日本超商招牌商品！'},{kana:"ち",rom:"chi",food:"🍢",foodJP:"ちくわ",foodZH:"竹輪",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ち」唸「chi＝七」。台語「七」念「tshit」，很像！竹輪＝<b>ち</b>くわ。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商關東煮鍋「<b>ち</b>くわ」是黃色管狀，最便宜的關東煮食材！'},{kana:"つ",rom:"tsu",food:"🍡",foodJP:"つくね",foodZH:"雞肉丸",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「つ」唸「tsu」，嘴型像在吹氣。雞肉丸＝<b>つ</b>くね，tsu-ku-ne三拍節奏記起來！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>烤雞串店「<b>つ</b>くね」是雞肉丸口味，通常有醬汁和鹽兩種選擇！'},{kana:"て",rom:"te",food:"🍤",foodJP:"てんぷら",foodZH:"天婦羅",hint:'<span class="hint-tag tag-kanji">漢字</span>「て」來自漢字「天」！天婦羅＝<b>て</b>んぷら。「天」的日文音就是てん，直接對應！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>蕎麥麵店菜單「<b>て</b>んぷらそば」，天婦羅蕎麥麵是最受歡迎的組合！'},{kana:"と",rom:"to",food:"🧈",foodJP:"とうふ",foodZH:"豆腐",hint:'<span class="hint-tag tag-kanji">漢字</span>「と」來自漢字「止」，唸「to＝投」。豆腐＝<b>と</b>うふ，「豆」的日文音就是と！中文「豆」→日文「と」，直覺對應。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商必買「<b>と</b>うふ」，日本豆腐滑嫩度跟台灣完全不同層次！'}]},{row:"な行",items:[{kana:"な",rom:"na",food:"🫘",foodJP:"なっとう",foodZH:"納豆",hint:'<span class="hint-tag tag-kanji">漢字</span>「な」來自漢字「奈」，唸「na」。納豆＝<b>な</b>っとう。中文「納」台語念「na̍p」，開頭一模一樣！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商早餐區「<b>な</b>っとう卷き」（納豆捲），旅行早晨挑戰日式早餐！'},{kana:"に",rom:"ni",food:"🥕",foodJP:"にんじん",foodZH:"紅蘿蔔",hint:'<span class="hint-tag tag-kanji">漢字</span>「に」來自漢字「仁」，唸「ni＝尼」。紅蘿蔔＝にんじん，其實就是中文「人參」的日文讀音！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超市蔬菜區看到「<b>に</b>んじん」，日本紅蘿蔔又甜又嫩！'},{kana:"ぬ",rom:"nu",food:"🥒",foodJP:"ぬか漬け",foodZH:"糠漬物",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ぬ」唸「nu＝怒」。「糠」日文就是ぬか，用來醃漬蔬菜的傳統做法。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>定食店附餐「<b>ぬ</b>か漬け」是醃黃瓜，日式定食必有的小菜！'},{kana:"ね",rom:"ne",food:"🌿",foodJP:"ねぎ",foodZH:"蔥",hint:'<span class="hint-tag tag-kanji">漢字</span>「ね」來自漢字「祢」，唸「ne＝內」。蔥＝ねぎ，只有兩個音，ne-gi，很快就記住！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>拉麵追加配料「<b>ね</b>ぎ増し」就是加蔥，日本蔥比台灣細又香！'},{kana:"の",rom:"no",food:"🌿",foodJP:"のり",foodZH:"海苔",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「の」你一定見過！唸「no」，日文最常見的字——「〇の〇」就是「〇的〇」。海苔＝<b>の</b>り。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商飯糰包裝上「<b>の</b>り」是海苔口味，黑色包裝最好認！'}]},{row:"は行",items:[{kana:"は",rom:"ha",food:"🍯",foodJP:"はちみつ",foodZH:"蜂蜜",hint:'<span class="hint-tag tag-kanji">漢字</span>「は」來自漢字「波」，唸「ha＝哈」。蜂蜜＝<b>は</b>ちみつ，「蜂」日文是はち（八），蜂蜜就是はち的蜜！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>藥妝店「<b>は</b>ちみつレモン」（蜂蜜檸檬）飲料，旅遊補充體力必買！'},{kana:"ひ",rom:"hi",food:"🥢",foodJP:"ひじき",foodZH:"羊栖菜",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ひ」唸「hi＝嘻」。羊栖菜＝ひじき，是日式便當裡那道黑色小菜，很健康！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商便當配菜「<b>ひ</b>じきの煮物」，日式便當一定有這道黑色小菜！'},{kana:"ふ",rom:"fu",food:"🧂",foodJP:"ふりかけ",foodZH:"飯鬆",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ふ」唸「fu」，輕輕吹氣的感覺。ふりかけ的「ふり」就是「撒」的意思——撒在白飯上的調味料！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商賣場「<b>ふ</b>りかけ」整排小包裝，買回台灣配白飯超好吃的伴手禮！'},{kana:"へ",rom:"he",food:"🥬",foodJP:"へちま",foodZH:"絲瓜",hint:'<span class="hint-tag tag-kanji">漢字</span>「へ」來自漢字「部」，唸「he＝嘿」。へ的字形極簡，就一個山丘——最好認的假名之一！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>沖繩傳統料理「<b>へ</b>ちまの炒め物」，去沖繩一定會在菜單上看到！'},{kana:"ほ",rom:"ho",food:"🥬",foodJP:"ほうれんそう",foodZH:"菠菜",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ほ」唸「ho」。菠菜＝ほうれんそう。中文「菠」的音跟ほ也很接近！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商涼拌菜「<b>ほ</b>うれんそうのおひたし」，看到ほうれんそう就是菠菜！'}]},{row:"ま行",items:[{kana:"ま",rom:"ma",food:"🐟",foodJP:"まぐろ",foodZH:"鮪魚",hint:'<span class="hint-tag tag-kanji">漢字</span>「ま」來自漢字「末」，唸「ma＝媽」。鮪魚＝まぐろ，壽司店最常見的魚名。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>築地或豐洲市場招牌「<b>ま</b>ぐろ丼」，鮪魚蓋飯是市場必吃！'},{kana:"み",rom:"mi",food:"🍲",foodJP:"みそ",foodZH:"味噌",hint:'<span class="hint-tag tag-kanji">漢字</span>「み」來自漢字「美」，唸「mi」。味噌＝みそ。中文「味」台語念「bī」，跟み很接近！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>定食店「<b>み</b>そ汁付き」就是附味噌湯，日本餐廳標配！'},{kana:"む",rom:"mu",food:"🌾",foodJP:"むぎ",foodZH:"麥子",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「む」唸「mu＝嘸」。麥茶＝むぎ茶，日本夏天到處都在喝的國民飲料！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商飲料「<b>む</b>ぎ茶」（麥茶）是日本夏天國民飲料，無糖又好喝！'},{kana:"め",rom:"me",food:"🐡",foodJP:"めんたいこ",foodZH:"明太子",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「め」唸「me＝妹」。明太子＝<b>め</b>んたいこ，博多名物！「明」的日文音就是めん。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商飯糰「<b>め</b>んたいこ」口味是辣紅色包裝，超人氣！博多必買伴手禮！'},{kana:"も",rom:"mo",food:"🌱",foodJP:"もやし",foodZH:"豆芽",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「も」唸「mo＝摸」。豆芽＝もやし，拉麵加もやし通常免費，記住這個字省錢！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>拉麵追加「<b>も</b>やし増し」就是加豆芽，通常免費或只要¥50！'}]},{row:"や行",items:[{kana:"や",rom:"ya",food:"🍢",foodJP:"やきとり",foodZH:"烤雞串",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「や」唸「ya＝呀」。やきとり＝焼き鳥＝烤雞串。「焼き」就是「烤」，記住やき這個萬用字！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>居酒屋必點「<b>や</b>きとり5本セット」，烤雞串5串一組，邊喝啤酒邊吃！'},{kana:"ゆ",rom:"yu",food:"🍋",foodJP:"ゆず",foodZH:"柚子",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ゆ」唸「yu＝又」。柚子＝ゆず，中文「柚」念yòu，日文ゆ念yu，同源！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>冬至泡「<b>ゆ</b>ず湯」是日本傳統，超商也賣ゆず口味飲料和甜點！'},{kana:"よ",rom:"yo",food:"🥟",foodJP:"ぎょうざ",foodZH:"餃子",hint:'<span class="hint-tag tag-kanji">漢字</span>「よ」來自漢字「與」，唸「yo」。餃子＝ぎょうざ，「餃」的日文音ぎょ裡面就含有よ的音！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>宇都宮是「ぎょうざの街」，車站前整排餃子店，一定要去吃！'}]},{row:"ら行",items:[{kana:"ら",rom:"ra",food:"🍜",foodJP:"らーめん",foodZH:"拉麵",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ら」唸「ra＝拉」。拉麵＝<b>ら</b>ーめん！「拉」的音就是ら，你已經會了！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>日本拉麵店招牌寫「<b>ら</b>ーめん」，看到這三個字就知道是拉麵店！'},{kana:"り",rom:"ri",food:"🍎",foodJP:"りんご",foodZH:"蘋果",hint:'<span class="hint-tag tag-kanji">漢字</span>「り」來自漢字「利」，唸「ri＝哩」。蘋果＝りんご，「林檎」的日文讀音！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>青森蘋果超有名，超市「<b>り</b>んごジュース」（蘋果汁）種類超多！'},{kana:"る",rom:"ru",food:"🐟",foodJP:"るいべ",foodZH:"冰凍鮭魚",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「る」唸「ru＝嚕」。<b>る</b>いべ是北海道原住民料理，把鮭魚冷凍後切片生吃，口感像冰淇淋！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>北海道居酒屋菜單「<b>る</b>いべ」，是當地才吃得到的特色料理！'},{kana:"れ",rom:"re",food:"🪷",foodJP:"れんこん",foodZH:"蓮藕",hint:'<span class="hint-tag tag-kanji">漢字</span>「れ」來自漢字「禮」，唸「re＝累」。蓮藕＝れんこん。「蓮」的日文音就是れん！<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商便當配菜「<b>れ</b>んこんのきんぴら」（蓮藕炒牛蒡），日式便當最常見小菜！'},{kana:"ろ",rom:"ro",food:"🔥",foodJP:"ろばたやき",foodZH:"爐端燒",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>「ろ」唸「ro＝囉」。爐端燒＝<b>ろ</b>ばたやき，「爐」的日文音就是ろ！在炭火爐邊烤海鮮的日式料理。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>居酒屋看到「<b>ろ</b>ばた」招牌，就是炭火直烤的海鮮店，氣氛超棒！'}]},{row:"わ行",items:[{kana:"わ",rom:"wa",food:"🌿",foodJP:"わさび",foodZH:"山葵",hint:'<span class="hint-tag tag-sound">🔊 聲音</span>吃到山葵的瞬間：「<b>わ</b>！」嗆到鼻子的那個驚呼就是わ！わさび你一定聽過。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商買管裝「<b>わ</b>さび」帶回台灣，綠色軟管配壽司超正宗！'},{kana:"を",rom:"wo",food:"🍙",foodJP:"おにぎりをたべる",foodZH:"吃飯糰",hint:'<span class="hint-tag tag-memory">💡 文法功能</span>「を」是助詞，發音同「お」但寫法不同。おにぎり<b>を</b>たべる＝吃飯糰。「を」放在「被吃的東西」後面。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>點餐說「これをください」（請給我這個），「を」這個字旅遊超實用！'},{kana:"ん",rom:"n",food:"🍊",foodJP:"みかん",foodZH:"橘子",hint:'<span class="hint-tag tag-memory">💡 特殊角色</span>「ん」是唯一不帶母音的假名，就唸「嗯」。它只出現在字尾或字中：みか<b>ん</b>（橘子）、うど<b>ん</b>（烏龍麵）。<br><span class="hint-tag tag-scene">🗾 旅遊場景</span>超商「みかんジュース」（橘子汁）是冬天限定，看到ん就知道音節結束了！'}]}];
const DATA=ROWS.flatMap(r=>r.items.map(i=>({...i,row:r.row})));const MT=5,SK='shokugo_v2',MQ=10;
function td(){return new Date().toISOString().slice(0,10)}function defSave(){const ks={};DATA.forEach(d=>{ks[d.kana]={c:0,w:0,s:0}});return{xp:0,str:{n:0,d:null},ci:false,ciD:null,nk:0,nkD:null,vis:[],ciLog:[],ks}}
function load(){try{const r=localStorage.getItem(SK);if(!r)return defSave();const s=JSON.parse(r);DATA.forEach(d=>{if(!s.ks[d.kana])s.ks[d.kana]={c:0,w:0,s:0}});if(!s.ciLog)s.ciLog=[];const t=td();if(s.str.d){const diff=Math.floor((new Date(t)-new Date(s.str.d))/864e5);if(diff>1)s.str.n=0}if(s.ciD!==t)s.ci=false;if(s.nkD!==t){s.nk=0;s.nkD=t}return s}catch(e){return defSave()}}
function sv(){localStorage.setItem(SK,JSON.stringify(S))}let S=load();
function doCheckin(){if(S.ci)return;const t=td();if(S.str.d===t)return;const last=S.str.d;if(last){const diff=Math.floor((new Date(t)-new Date(last))/864e5);if(diff===1)S.str.n++;else if(diff>1)S.str.n=1}else S.str.n=1;S.str.d=t;S.ci=true;S.ciD=t;if(!S.ciLog.includes(t))S.ciLog.push(t);if(S.ciLog.length>60)S.ciLog=S.ciLog.slice(-60);sv();toast('🔥 今天打卡成功！連續 '+S.str.n+' 天')}
function recLearn(idx){const t=td();if(S.nkD!==t){S.nk=0;S.nkD=t}if(!S.vis.includes(idx)){S.nk++;if(S.nk>=5)doCheckin()}if(!S.vis.includes(idx))S.vis.push(idx);S.ks[DATA[idx].kana].s++;sv()}
function recQuiz(k,ok){S.ks[k].s++;if(ok)S.ks[k].c++;else S.ks[k].w++;sv()}
function pickQ(){const ws=DATA.map(d=>{const s=S.ks[d.kana];if(s.s===0)return 10;if(s.c>=MT&&s.c>s.w*2)return 1;if(s.w>=s.c)return 8;if(s.c<3)return 5;return 2});const tot=ws.reduce((a,b)=>a+b,0);let r=Math.random()*tot;for(let i=0;i<ws.length;i++){r-=ws[i];if(r<=0)return DATA[i]}return DATA[0]}
function isM(k){const s=S.ks[k];return s.c>=MT&&s.c>s.w*2}
let cur=0,qMode='A',qIdx=0,qScores=[],qAns=false,qSC=0;
function hdr(){document.getElementById('streakNum').textContent=S.str.n;document.getElementById('xpNum').textContent=S.xp}
function go(tab){['home','learn','quiz','chart'].forEach(t=>{document.getElementById(t+'Tab').style.display=t===tab?'block':'none';document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['home','learn','quiz','chart'][i]===tab)})});document.getElementById('scrollArea').scrollTop=0;if(tab==='learn'){renderDots();updateCard()}if(tab==='quiz')initQuiz();if(tab==='chart')renderChart();if(tab==='home')renderHome()}
function getWeekDays(){const now=new Date();const di=(now.getDay()+6)%7;const mon=new Date(now);mon.setDate(now.getDate()-di);const ds=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);ds.push(d.toISOString().slice(0,10))}return ds}
function renderHome(){hdr();const vs=new Set(S.vis),pct=Math.round(vs.size/DATA.length*100),mc=DATA.filter(d=>isM(d.kana)).length,ci=S.ci;const wk=getWeekDays(),ts=td(),dl=['一','二','三','四','五','六','日'];const wHTML=wk.map((ds,i)=>{const ck=S.ciLog&&S.ciLog.includes(ds);const it=ds===ts;return'<div class="sday'+(ck?' done':'')+(it&&ck?' active':'')+'">'+dl[i]+'</div>'}).join('');const stHTML=DATA.map(d=>{const m=isM(d.kana);return'<div class="sticker'+(m?' earned':' locked')+'">'+d.food+'<span class="sk">'+d.kana+'</span></div>'}).join('');
document.getElementById('homeTab').innerHTML='<div class="home-hero"><h2>今天學幾個？</h2><p>每天10分鐘，一個月後<br>去日本吃遍全超商！</p><div class="home-progress"><div class="home-pbar"><div class="home-pfill" style="width:'+pct+'%"></div></div><span class="home-pct">'+vs.size+'/46</span></div></div><div class="streak-card"><div class="streak-icon">🔥</div><div class="streak-info"><h3>連續 '+S.str.n+' 天！</h3><p>'+(ci?'今天已打卡，繼續保持！':'今天還沒打卡')+'</p><span class="ci-status '+(ci?'ci-done':'ci-pending')+'">'+(ci?'✅ 已打卡':'⏳ 學5個新字 或 完成1次測驗')+'</span><div class="streak-days" style="display:flex;gap:5px;margin-top:8px;">'+wHTML+'</div></div></div><div style="background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(26,10,0,.08);margin-bottom:14px;"><h3 style="font-size:14px;font-weight:800;margin-bottom:6px;">📊 學習統計</h3><div style="display:flex;gap:10px;justify-content:center;"><div class="end-stat"><div class="end-stat-n">'+vs.size+'</div><div class="end-stat-l">已學習</div></div><div class="end-stat"><div class="end-stat-n">'+mc+'</div><div class="end-stat-l">已掌握</div></div><div class="end-stat"><div class="end-stat-n">'+S.xp+'</div><div class="end-stat-l">總XP</div></div></div></div><div class="stickers-card"><h3>🏷️ 食物貼紙收藏（掌握假名即解鎖）<span style="font-size:11px;color:var(--light);font-weight:400;"> '+mc+'/46</span></h3><div class="sticker-grid">'+stHTML+'</div></div><div class="quick-btns"><button class="qbtn qbtn-learn" onclick="go(\'learn\')">📖 繼續學習</button><button class="qbtn qbtn-quiz" onclick="go(\'quiz\')">🎯 開始測驗</button></div><div style="text-align:center;margin-top:12px;"><button class="reset-btn" onclick="if(confirm(\'確定要重置所有進度嗎？\')){localStorage.removeItem(\''+SK+'\');location.reload();}">🔄 重置進度</button></div>'}
function renderDots(){const strip=document.getElementById('dotStrip');strip.innerHTML='';const vs=new Set(S.vis);DATA.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===cur?' cur':isM(DATA[i].kana)?' mastered':vs.has(i)?' done':'');d.onclick=()=>{cur=i;updateCard()};strip.appendChild(d)})}
function updateCard(){recLearn(cur);const d=DATA[cur];document.getElementById('cardRow').textContent=d.row;document.getElementById('foodWrap').textContent=d.food;document.getElementById('kanaDisp').textContent=d.kana;document.getElementById('romDisp').textContent=d.rom;document.getElementById('foodLabel').innerHTML=d.foodJP.replace(d.kana,'<span class="hl">'+d.kana+'</span>');document.getElementById('foodZh').textContent=d.foodZH;const st=S.ks[d.kana];const sl=st.s>0?'<div style="font-size:10px;color:var(--light);margin-top:8px;text-align:center;">練習 '+st.s+' 次 ｜ ✅ '+st.c+' ｜ ❌ '+st.w+(isM(d.kana)?' ｜ ⭐ 已掌握':'')+'</div>':'';document.getElementById('hintCard').innerHTML='<b>記憶提示</b><br>'+d.hint+sl;renderDots();hdr();['learnCard','foodWrap'].forEach(id=>{const el=document.getElementById(id);el.style.animation='none';el.offsetHeight;el.style.animation=id==='learnCard'?'fadeUp .35s ease':'pop .45s cubic-bezier(.34,1.56,.64,1)'})}
function next(){if(cur<DATA.length-1){cur++;updateCard();addXP(2)}}function prev(){if(cur>0){cur--;updateCard()}}
function playSound(){const d=DATA[cur];if('speechSynthesis' in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(d.foodJP);u.lang='ja-JP';u.rate=0.75;u.pitch=1.1;speechSynthesis.speak(u)}}
function setMode(m){qMode=m;['A','B','C'].forEach(x=>document.getElementById('m'+x).classList.toggle('active',x===m));initQuiz()}
function initQuiz(){qIdx=0;qScores=[];qAns=false;qSC=0;document.getElementById('quizWrap').innerHTML='<div class="mode-sel"><button class="mode-btn active" id="mA" onclick="setMode(\'A\')">🔤 拼音選假名</button><button class="mode-btn" id="mB" onclick="setMode(\'B\')">あ 假名選拼音</button><button class="mode-btn" id="mC" onclick="setMode(\'C\')">🏪 超商場景</button></div><div class="quiz-top" id="quizTop"><div class="quiz-stats"><span class="stat-pill stat-score">分數 <span id="qScore">0</span></span><span class="stat-pill stat-streak2">連答 <span id="qStreak">0</span></span><span class="stat-pill stat-pct">正確 <span id="qPct">-</span></span></div><div class="score-row" id="scoreRow"></div><div id="quizContent"></div><div class="quiz-q" id="quizQ"></div></div><div class="opts" id="opts"></div><div class="result-bar" id="resultBar"></div>';['A','B','C'].forEach(x=>document.getElementById('m'+x).classList.toggle('active',x===qMode));renderQuiz()}
function renderQuiz(){if(qIdx>=MQ){showEnd();return}const cd=pickQ();let wrongs=[];while(wrongs.length<3){const r=DATA[Math.floor(Math.random()*DATA.length)];if(r.kana!==cd.kana&&!wrongs.find(w=>w.kana===r.kana))wrongs.push(r)}const opts=[cd,...wrongs].sort(()=>Math.random()-.5);const sr=document.getElementById('scoreRow');sr.innerHTML='';for(let i=0;i<MQ;i++){const s=document.createElement('div');s.className='sq'+(i<qScores.length?(qScores[i]?' hit':' miss'):'');sr.appendChild(s)}const tot=qScores.length,hits=qScores.filter(Boolean).length;document.getElementById('qScore').textContent=hits*10;document.getElementById('qStreak').textContent=qSC;document.getElementById('qPct').textContent=tot?Math.round(hits/tot*100)+'%':'-';const qc=document.getElementById('quizContent'),qq=document.getElementById('quizQ');qc.innerHTML='';if(qMode==='A'){qc.innerHTML='<div class="quiz-romaji">'+cd.rom+'</div>';qq.innerHTML='下面哪個假名的發音是 <b>'+cd.rom+'</b>？';const oe=document.getElementById('opts');oe.innerHTML='';opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="ok">'+o.kana+'</span>';b.onclick=()=>answer(b,o.kana===cd.kana,cd);oe.appendChild(b)})}else if(qMode==='B'){qc.innerHTML='<div class="quiz-kana-big">'+cd.kana+'</div>';qq.innerHTML='這個假名 <b>'+cd.kana+'</b> 的發音是？';const oe=document.getElementById('opts');oe.innerHTML='';opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="ok" style="font-family:\'M PLUS Rounded 1c\',sans-serif;font-size:28px;font-weight:800;">'+o.rom+'</span>';b.onclick=()=>answer(b,o.rom===cd.rom,cd);oe.appendChild(b)})}else{renderSpell(cd);return}document.getElementById('resultBar').className='result-bar';qAns=false}
function answer(btn,ok,d){if(qAns)return;qAns=true;btn.classList.add(ok?'correct':'wrong');qScores.push(ok);recQuiz(d.kana,ok);if(ok){qSC++;addXP(10+qSC*2);confetti();beepOk();if(qSC>=3)toast('🔥 連答'+qSC+'個！+'+qSC*2+'bonus XP')}else{qSC=0;beepNo()}const rb=document.getElementById('resultBar');rb.className='result-bar show '+(ok?'ok':'no');rb.textContent=ok?'✅ 正確！'+d.kana+'（'+d.rom+'）→「'+d.foodJP+'」'+d.food:'❌ 答案是 '+d.kana+'（'+d.rom+'）→「'+d.foodJP+'」'+d.food;setTimeout(()=>{qIdx++;renderQuiz()},ok?1600:6600)}
const AC=window.AudioContext||window.webkitAudioContext;let ax=null;function gax(){try{if(!ax)ax=new AC();return ax}catch(e){return null}}
function beepOk(){const c=gax();if(!c)return;try{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(523,c.currentTime);o.frequency.setValueAtTime(659,c.currentTime+.1);o.frequency.setValueAtTime(784,c.currentTime+.2);g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.start();o.stop(c.currentTime+.5)}catch(e){}}
function beepNo(){const c=gax();if(!c)return;try{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(220,c.currentTime);o.frequency.setValueAtTime(160,c.currentTime+.12);g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.35);o.start();o.stop(c.currentTime+.35)}catch(e){}}
function beepTap(){const c=gax();if(!c)return;try{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(660,c.currentTime);g.gain.setValueAtTime(.12,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.08);o.start();o.stop(c.currentTime+.08)}catch(e){}}
function getRomaji(ks){const map={};DATA.forEach(d=>{if(d.kana)map[d.kana]=d.rom});const ext={'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go','ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo','だ':'da','ぢ':'di','づ':'du','で':'de','ど':'do','ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po'};Object.keys(ext).forEach(k=>{if(!map[k])map[k]=ext[k]});const cb={'ゃ':'ya','ゅ':'yu','ょ':'yo'};const res=[];let i=0;while(i<ks.length){const ch=ks[i];if(ch==='っ'){const nc=ks[i+1];if(nc&&map[nc]){const nr=map[nc];const an=ks[i+2];if(an&&cb[an]){const b=nr.slice(0,-1);const f=b+cb[an];res.push(f[0]+f);i+=3}else{res.push(nr[0]+nr);i+=2}}else i++;continue}if(ch==='ー'){if(res.length>0)res.push(res[res.length-1].slice(-1));i++;continue}if(ch===' '||ch==='　'){i++;continue}const nc=ks[i+1];if(map[ch]&&nc&&cb[nc]){res.push(map[ch].slice(0,-1)+cb[nc]);i+=2;continue}if(map[ch]){res.push(map[ch]);i++;continue}i++}return res}
let spT=[],spP=[],spD=null,spA=0;
function renderSpell(cd){spD=cd;spT=getRomaji(cd.foodJP);if(spT.length===0){qMode='A';renderQuiz();qMode='C';return}spP=[];spA=0;const price=(Math.floor(Math.random()*8)+1)*100+(Math.random()>.5?80:0);const stores=['セブンイレブン','ファミリーマート','ローソン'];const store=stores[Math.floor(Math.random()*stores.length)];const cu=[...new Set(spT)];const ar=[...new Set(DATA.map(d=>d.rom))];const need=Math.max(8-cu.length,2);const dp=ar.filter(r=>!cu.includes(r)).sort(()=>Math.random()-.5);const bp=[...cu,...dp.slice(0,need)].sort(()=>Math.random()-.5);const sr=document.getElementById('scoreRow');sr.innerHTML='';for(let i=0;i<MQ;i++){const s=document.createElement('div');s.className='sq'+(i<qScores.length?(qScores[i]?' hit':' miss'):'');sr.appendChild(s)}const tot=qScores.length,hits=qScores.filter(Boolean).length;document.getElementById('qScore').textContent=hits*10;document.getElementById('qStreak').textContent=qSC;document.getElementById('qPct').textContent=tot?Math.round(hits/tot*100)+'%':'-';document.getElementById('quizContent').innerHTML='<div class="spell-label"><div class="spell-banner">'+store+'</div><div class="spell-name">'+cd.foodJP+'</div><div class="spell-zh">'+cd.foodZH+'</div><div class="spell-price">¥'+price+'<span style="font-size:11px">（税込）</span></div></div>';document.getElementById('quizQ').innerHTML='依序選出 <b>'+cd.foodJP+'</b> 的發音';document.getElementById('resultBar').className='result-bar';document.getElementById('opts').innerHTML='<div class="spell-progress" id="spellProgress">'+spT.map((_,i)=>'<div class="spell-slot empty" id="slot'+i+'">＿</div>').join('')+'</div><div class="spell-hint">共 '+spT.length+' 個音，按順序選！按鈕可重複使用</div><div class="spell-opts" id="spellOpts"></div>';const so=document.getElementById('spellOpts');bp.forEach(rom=>{const b=document.createElement('button');b.className='spell-opt';b.textContent=rom;b.onclick=()=>spellTap(b,rom);so.appendChild(b)})}
function spellTap(btn,rom){const exp=spT[spP.length];if(!exp)return;if(rom===exp){spP.push(rom);beepTap();const slot=document.getElementById('slot'+(spP.length-1));slot.textContent=rom;slot.className='spell-slot filled';if(spP.length===spT.length){spA===0?qScores.push(true):qScores.push(false);recQuiz(spD.kana,spA===0);const won=spA===0;if(won){qSC++;addXP(20+qSC*3);confetti();beepOk();if(qSC>=3)toast('🔥 連答'+qSC+'個！')}else{qSC=0;beepTap()}const rb=document.getElementById('resultBar');rb.className='result-bar show '+(won?'ok':'no');rb.textContent=won?'✅ 完美！'+spD.foodJP+' = '+spT.join('-')+' '+spD.food:'✅ 拼出來了！但中途答錯過，繼續加油 '+spD.food;setTimeout(()=>{qIdx++;renderQuiz()},won?2000:7000)}}else{spA++;qSC=0;beepNo();btn.classList.add('flash-wrong');setTimeout(()=>btn.classList.remove('flash-wrong'),600);spT.forEach((_,i)=>{const s=document.getElementById('slot'+i);if(s){s.className='spell-slot wrong-flash';setTimeout(()=>{s.className='spell-slot empty';s.textContent='＿'},700)}});spP=[];const rb=document.getElementById('resultBar');rb.className='result-bar show no';rb.textContent='❌ 答錯了！從頭重拼 — 提示：'+spT[0]+'開頭';setTimeout(()=>{rb.className='result-bar'},7000)}}
function showEnd(){doCheckin();const hits=qScores.filter(Boolean).length,pct=Math.round(hits/MQ*100),bonus=hits>=9?50:hits>=7?30:hits>=5?10:0;if(bonus)addXP(bonus);const mc=DATA.filter(d=>isM(d.kana)).length;document.getElementById('quizWrap').innerHTML='<div class="quiz-end"><div class="end-emoji">'+(pct>=90?'🎉':pct>=70?'😊':pct>=50?'🙂':'😅')+'</div><div class="end-score">'+hits+'/'+MQ+'</div><div class="end-label">'+(pct>=90?'完美！你是假名大師！':pct>=70?'很棒！繼續練習！':pct>=50?'加油！你做得到！':'再練習一次，你可以的！')+'</div><div class="end-stats"><div class="end-stat"><div class="end-stat-n">'+pct+'%</div><div class="end-stat-l">正確率</div></div><div class="end-stat"><div class="end-stat-n">'+(hits*10+bonus)+'XP</div><div class="end-stat-l">獲得經驗</div></div><div class="end-stat"><div class="end-stat-n">'+mc+'⭐</div><div class="end-stat-l">已掌握</div></div></div>'+(bonus?'<div style="color:var(--gold);font-size:13px;margin-bottom:12px;font-weight:700">🌟 優秀獎勵 +'+bonus+'XP！</div>':'')+'<button class="btn-replay" onclick="initQuiz()">再挑戰一次 🎯</button></div>';if(pct>=90)for(let i=0;i<6;i++)setTimeout(confetti,i*150)}
function renderChart(){const w=document.getElementById('chartWrap');w.innerHTML='';const vs=new Set(S.vis);ROWS.forEach(row=>{const sec=document.createElement('div');sec.className='row-block';sec.innerHTML='<div class="row-hdr">'+row.row+'</div>';const g=document.createElement('div');g.className='kgrid';row.items.forEach(item=>{const idx=DATA.findIndex(d=>d.kana===item.kana);const m=isM(item.kana);const st=S.ks[item.kana];const c=document.createElement('div');c.className='kcell'+(m?' mastered':vs.has(idx)?' done':'');let dot='';if(st.s>0){const r=st.c/(st.c+st.w||1);dot='<span class="mdot" style="background:'+(r>=.8?'var(--green2)':r>=.5?'var(--gold2)':'var(--red2)')+'"></span>'}c.innerHTML=dot+'<span class="cf">'+item.food+'</span><span class="ck">'+item.kana+'</span><span class="cr">'+item.rom+'</span>';c.onclick=()=>{cur=idx;go('learn')};g.appendChild(c)});sec.appendChild(g);w.appendChild(sec)})}
function addXP(n){S.xp+=n;sv();hdr()}
function confetti(){const l=document.getElementById('confettiLayer');const cs=['#C13030','#D4922A','#2E7D52','#2255AA','#E84040','#F0B84A'];for(let i=0;i<16;i++){const p=document.createElement('div');p.className='cp';p.style.cssText='left:'+Math.random()*100+'%;top:0;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;background:'+cs[Math.floor(Math.random()*cs.length)]+';animation-delay:'+Math.random()*.4+'s;animation-duration:'+(.9+Math.random()*.6)+'s';l.appendChild(p);setTimeout(()=>p.remove(),1600)}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
hdr();renderHome();
</script>
